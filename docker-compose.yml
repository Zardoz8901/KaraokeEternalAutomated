# Karaoke Hydra with app-managed Authentik OIDC
#
# This setup assumes Authentik is already running as an OIDC provider.
# The karaoke service should sit behind a simple HTTPS reverse proxy.

services:
  karaoke:
    build:
      context: .
      dockerfile: Dockerfile
    image: karaoke-hydra:latest
    container_name: karaoke-hydra
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent data (database, config)
      - karaoke_data:/data
      # Media library - mount your karaoke files here
      - /media/karaoke:/media:ro
    environment:
      - NODE_ENV=production
      - KES_PORT=3000
      - KES_PATH_DATA=/data
      - KES_PATH_MEDIA=/media
      # OIDC configuration
      # - KES_OIDC_ISSUER_URL=https://auth.example.com/application/o/karaoke-eternal/
      # - KES_OIDC_CLIENT_ID=your-client-id
      # - KES_OIDC_CLIENT_SECRET=your-client-secret
      # - KES_PUBLIC_URL=https://karaoke.example.com
      # - KES_REQUIRE_PROXY=true
      # Uncomment to rotate JWT key on restart
      # - KES_ROTATE_KEY=1
    labels:
      # Example Traefik labels for Authentik forward auth
      # Adjust these for your reverse proxy setup
      - "traefik.enable=true"
      - "traefik.http.routers.karaoke.rule=Host(`karaoke.example.com`)"
      - "traefik.http.routers.karaoke.entrypoints=websecure"
      - "traefik.http.routers.karaoke.tls.certresolver=letsencrypt"
      - "traefik.http.services.karaoke.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  karaoke_data:
    driver: local
